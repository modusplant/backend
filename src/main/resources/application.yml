spring:
  application:
    name: modusplant
  profiles:
    active: ${SPRING_ACTIVE_PROFILE:local}
    include: secrets
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED}
      connect-timeout: 20s
      timeout: 3000
  datasource:
    driverClassName: org.postgresql.Driver
    url: ${DB_CONNECTION_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      idle-timeout: 60000             # 10분
      max-lifetime: 1800000           # 30분
      connection-timeout: 10000       # 10초
      auto-commit: true
      validation-timeout: 10000       # 10초
      connection-init-sql: "SET pg_trgm.word_similarity_threshold = 0.5"
  flyway:
    enabled: true
    validate-on-migrate: true
    out-of-order: false
    locations:
      - classpath:db/migration
    encoding: UTF-8
    detect-encoding: true
    baseline-on-migrate: true
    baseline-version: 0.0.0
    schemas: public
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        order_inserts: true
        default_schema: ${DB_SCHEMA}
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB             # 파일 최대 크기: 10MB, 동영상 최대 크기: 20MB
      max-request-size: 220MB         # 파일 최대 개수: 10개, 동영상 최대 개수: 5개

# Application
app:
  semaphore:
    datasource:
      bulkhead:
        notification:
          timeout-ms: 3000

# Firebase
firebase:
  credentials:
    json: ${FIREBASE_CREDENTIALS_JSON}

# KeyStore
keystore:
  key-store-password: ${KEYSTORE_PASSWORD}
  key-store-type: PKCS12
  key-alias: modusplant-server
  key-store-filename: modusplant-server-keystore.12

# JWT
jwt:
  iss: https://app.modusplant.kr
  aud: https://www.modusplant.kr
  access_duration: 1800000      # 30분
  refresh_duration: 604800000   # 7일

# Monitoring
management:
  server:
    port: 8080
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  metrics:
    enable:
      tomcat: true
    distribution:
      percentiles:
        http.server.requests: [ 0.95, 0.99 ]

# Redis
redis:
  ttl:
    view_count: 10

# Tomcat
server:
  tomcat:
    max-swallow-size: 20MB
    mbeanregistry:
      enabled: true

# Wasabi
cloud:
  aws:
    region:
      static: ap-northeast-2
  wasabi:
    s3:
      endpoint: ${WASABI_ENDPOINT}
      region: ${WASABI_REGION}
      access-key: ${WASABI_ACCESS_KEY}
      secret-key: ${WASABI_SECRET_KEY}
      bucket: ${WASABI_BUCKET}
      connection-timeout: 3
      socket-timeout: 30
      connection-max-idle-time: 30
      connection-ttl: 300
      connection-acquisition-timeout: 5