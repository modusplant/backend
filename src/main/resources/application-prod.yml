# Apache Tomcat
server:
  tomcat:
    threads:
      max: 80
    max-connections: 500
    accept-count: 100

# Application
app:
  semaphore:
    datasource:
      allowed-connection-size: 60
      api: # 디폴트로 사용할 수 있는 최대 커넥션 수
        connection-size: 50
      bulkhead: # 벌크헤드 패턴으로 격리된 개별 기능에 사용하는 최대 커넥션 수
        notification:
          connection-size: 10
          timeout-ms: 3000

# Debugging & Logging
logging:
  level:
    root: INFO
    io.lettuce: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
security:
  debug:
    enabled: false

# Scheduler
scheduler:
  sync-interval-ms : 300000           # 5분
  token-cleanup-cron : "0 0 3 * * *"  # 새벽 3시
  notification-cleanup-cron : "0 10 3 * * *"

# Spring
spring:
  datasource:
    hikari:
      pool-name: ProdHikariPool
      maximum-pool-size: 70
      minimum-idle: 16
  jpa:
    properties:
      hibernate:
        show_sql: false

# Swagger
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
